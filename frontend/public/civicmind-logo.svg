<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield outline in navy blue -->
  <path d="M60 10 L95 25 L95 55 Q95 85 60 110 Q25 85 25 55 L25 25 Z" 
        fill="#1E3A8A" opacity="0.95"/>
  
  <!-- Inner shield in lighter blue -->
  <path d="M60 20 L88 32 L88 55 Q88 80 60 100 Q32 80 32 55 L32 32 Z" 
        fill="#3B82F6"/>
  
  <!-- Wave pattern in orange/teal -->
  <path d="M40 45 Q50 35 60 45 T80 45" 
        stroke="#FF9933" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M40 55 Q50 45 60 55 T80 55" 
        stroke="#00D9FF" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M40 65 Q50 55 60 65 T80 65" 
        stroke="#FF9933" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Center circle for Ashoka Chakra -->
  <circle cx="60" cy="60" r="18" fill="white" opacity="0.9"/>
  <circle cx="60" cy="60" r="15" fill="none" stroke="#1E3A8A" stroke-width="2"/>
  
  <!-- Ashoka Chakra spokes (24 spokes simplified to 12 for cleaner look) -->
  <g stroke="#1E3A8A" stroke-width="1.5">
    <line x1="60" y1="46" x2="60" y2="74"/>
    <line x1="46" y1="60" x2="74" y2="60"/>
    <line x1="50" y1="50" x2="70" y2="70"/>
    <line x1="70" y1="50" x2="50" y2="70"/>
    <line x1="53" y1="46" x2="67" y2="74"/>
    <line x1="67" y1="46" x2="53" y2="74"/>
    <line x1="46" y1="53" x2="74" y2="67"/>
    <line x1="74" y1="53" x2="46" y2="67"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="60" cy="60" r="3" fill="#1E3A8A"/>
</svg>
